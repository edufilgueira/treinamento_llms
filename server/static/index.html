<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oráculo — LoRA local</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7edf5;
      --muted: #8b9cb3;
      --accent: #5b9bd5;
      --user: #2d4a6f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    #status { font-size: 0.8rem; color: var(--muted); }
    #status.ready { color: #7dce9a; }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      max-width: 52rem;
      margin: 0 auto;
      width: 100%;
    }
    .msg {
      margin-bottom: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { background: var(--user); margin-left: 2rem; }
    .msg.assistant {
      background: var(--surface);
      border: 1px solid var(--border);
      margin-right: 2rem;
    }
    .msg .role {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    footer {
      padding: 0.75rem 1rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      max-width: 52rem;
      margin: 0 auto;
      width: 100%;
    }
    .row { display: flex; gap: 0.5rem; align-items: flex-end; }
    textarea {
      flex: 1;
      min-height: 3.2rem;
      max-height: 10rem;
      resize: vertical;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    button {
      padding: 0.65rem 1.1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; }
  </style>
</head>
<body>
  <header>
    <h1>Oráculo Santuário — chat local (LoRA)</h1>
    <span id="status">A ligar…</span>
  </header>
  <main id="log"></main>
  <footer>
    <div class="row">
      <textarea id="input" placeholder="Escreve a mensagem…" rows="2"></textarea>
      <button type="button" id="send">Enviar</button>
    </div>
    <p class="hint">O modelo fica carregado no servidor. A resposta aparece <strong>em streaming</strong> (token a token) enquanto gera.</p>
  </footer>
  <script>
    const logEl = document.getElementById("log");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const statusEl = document.getElementById("status");

    const history = [];

    async function refreshStatus() {
      try {
        const r = await fetch("/api/status");
        const j = await r.json();
        if (j.loaded) {
          statusEl.textContent = "Carregado: " + j.mode + " — " + j.model_name;
          statusEl.classList.add("ready");
        } else {
          statusEl.textContent = "A carregar modelo…";
        }
      } catch {
        statusEl.textContent = "Sem ligação ao servidor";
      }
    }

    function appendMessage(role, content) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      const r = document.createElement("div");
      r.className = "role";
      r.textContent = role === "user" ? "Tu" : "Assistente";
      div.appendChild(r);
      div.appendChild(document.createTextNode(content));
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function appendAssistantStreaming() {
      const div = document.createElement("div");
      div.className = "msg assistant";
      const r = document.createElement("div");
      r.className = "role";
      r.textContent = "Assistente";
      const textEl = document.createElement("span");
      div.appendChild(r);
      div.appendChild(textEl);
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      return textEl;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      appendMessage("user", text);
      history.push({ role: "user", content: text });
      sendBtn.disabled = true;

      const textEl = appendAssistantStreaming();
      let fullReply = "";

      try {
        const r = await fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: history.slice(),
            max_new_tokens: 2048,
            temperature: 0.7,
            top_p: 0.9,
          }),
        });
        if (!r.ok) {
          let detail = r.statusText;
          try {
            const errBody = await r.json();
            detail = typeof errBody.detail === "string" ? errBody.detail : JSON.stringify(errBody.detail);
          } catch (_) {}
          throw new Error(detail);
        }
        const reader = r.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          let sep;
          while ((sep = buf.indexOf("\n\n")) !== -1) {
            const block = buf.slice(0, sep);
            buf = buf.slice(sep + 2);
            for (const line of block.split("\n")) {
              if (!line.startsWith("data: ")) continue;
              const payload = line.slice(6).trim();
              if (payload === "[DONE]") continue;
              try {
                const j = JSON.parse(payload);
                if (j.delta) {
                  fullReply += j.delta;
                  textEl.textContent += j.delta;
                }
              } catch (_) {}
            }
          }
          logEl.scrollTop = logEl.scrollHeight;
        }
        history.push({ role: "assistant", content: fullReply });
      } catch (e) {
        textEl.textContent = "Erro: " + e.message;
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    refreshStatus();
    setInterval(refreshStatus, 8000);
  </script>
</body>
</html>
