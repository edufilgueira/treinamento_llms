<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Oráculo Kiaiá</title>
  <style>
    html, body { margin: 0; min-height: 100%; background: #212121; color: #ececec; }
    @media (max-width: 768px) { html, body { background: #000; } }
  </style>
  <link rel="stylesheet" href="app.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <div id="mobile-menu" class="mobile-menu" aria-hidden="true">
    <div class="mobile-menu__panel" id="mobile-menu-panel">
      <p class="mobile-menu__brand">Oráculo Kiaiá</p>
      <div class="mobile-menu__user">
        <span class="user-name" id="user-name-menu" title=""></span>
        <button type="button" class="btn-logout logout-btn" id="logout-menu">Sair</button>
      </div>
      <button type="button" class="menu-new-chat" id="menu-new-chat">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Novo chat
      </button>
      <div class="sessions-recent mobile-sessions">
        <h2 class="sessions-recent__label">Recentes</h2>
        <ul class="session-list" id="session-list-menu" aria-label="Conversas recentes"></ul>
      </div>
      <div id="menu-status">A ligar…</div>
      <p class="mobile-menu__hint">Deslize para a esquerda para voltar ao diálogo</p>
    </div>
  </div>

  <div class="app">
    <aside class="sidebar desktop-only" aria-label="Navegação">
      <button type="button" class="sidebar-new-chat" id="new-chat" title="Novo chat">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span>Novo chat</span>
      </button>
      <div class="sessions-recent">
        <h2 class="sessions-recent__label">Recentes</h2>
        <ul class="session-list" id="session-list" aria-label="Conversas recentes"></ul>
      </div>
    </aside>
    <div class="main-wrap">
      <div class="main-scroll">
        <header class="topbar">
          <div class="topbar-mobile-zone mobile-only">
            <button type="button" class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="mobile-menu" aria-label="Abrir menu">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <path d="M4 8h16M4 16h16"/>
              </svg>
            </button>
            <h1 class="mobile-title">Oráculo Kiaiá</h1>
            <button type="button" class="icon-btn mobile-only" id="mobile-new-chat" aria-label="Novo chat" title="Novo chat">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </button>
          </div>
          <div class="wordmark-wrap desktop-only">
            <button type="button" class="wordmark-btn" aria-label="Oráculo Kiaiá">
              <span class="header-wordmark">Oráculo Kiaiá</span>
              <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </button>
          </div>
          <div class="topbar__user desktop-only">
            <span class="user-name" id="user-name-desk" title=""></span>
            <button type="button" class="btn-logout logout-btn" id="logout-desk">Sair</button>
          </div>
          <span id="status" class="desktop-only">A ligar…</span>
        </header>
        <main id="log" class="chat-log" aria-live="polite">
          <div class="empty-state" id="empty-state">
            <p class="empty-state__title">Como posso ajudar?</p>
          </div>
          <div class="chat-log-inner" id="log-inner"></div>
        </main>
        <div class="composer-outer">
          <div class="composer-wrap">
            <div class="composer">
              <div class="composer-body">
                <textarea id="input" rows="1" placeholder="Mensagem…"></textarea>
              </div>
              <div class="composer-actions">
                <button type="button" class="send-btn" id="send" disabled aria-label="Enviar mensagem" title="Enviar">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 19V6"/><path d="m5 12 7-6 7 6"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div class="composer-shield" aria-hidden="true"></div>
          <footer class="composer-foot" aria-label="Assinatura">
            <p class="composer-foot__tagline">O código que se fez carne e a frequência de Tesla 369</p>
          </footer>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
